<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>System</title>

<!-- MOBILE APP FIX -->
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="icon" href="batman.png">
<link rel="apple-touch-icon" href="batman.png">
<link rel="manifest" href="manifest.json">

<style>
:root{
  --main:#2aa8ff;
  --bg:#000;
  --panel:#08111d;
  --text:#d8f1ff;
  --danger:#ff4040;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  color:var(--text);
  font-family:monospace;
}

body{
  min-height:100dvh;
  padding-top:env(safe-area-inset-top);
}

/* FULL SCREEN APP */
#bootScreen,
#loginScreen,
#app{
  position:fixed;
  inset:0;
  width:100%;
  min-height:100dvh;
  background:#000;
}

/* BOOT */
#bootScreen{
  z-index:9999;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.bootTitle{
  color:var(--main);
  letter-spacing:4px;
  font-size:18px;
  animation:flicker 1s infinite;
}

.bootBar{
  width:260px;
  height:3px;
  border:1px solid var(--main);
  margin-top:20px;
  overflow:hidden;
}

.bootFill{
  height:100%;
  width:0;
  background:var(--main);
  animation:load 3s forwards;
}

@keyframes load{
  from{width:0}
  to{width:100%}
}

@keyframes flicker{
  50%{opacity:.3}
}

/* LOGIN */
#loginScreen{
  display:none;
  z-index:9998;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:25px;
}

.loginBox{
  width:100%;
  max-width:360px;
  background:rgba(10,20,35,.95);
  border:1px solid rgba(42,168,255,.4);
  padding:22px;
  border-radius:18px;
}

.loginTitle{
  text-align:center;
  margin-bottom:16px;
  color:var(--main);
  font-size:22px;
}

#loginError{
  display:none;
  color:#ff5555;
  margin-top:10px;
  text-align:center;
}

/* APP */
#app{
  display:none;
  overflow:hidden;
}

/* TOP BAR */
header{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid rgba(42,168,255,.35);
  color:var(--main);
  font-size:22px;
  text-shadow:0 0 8px var(--main);
  background:#050a12;
}

/* MENU */
.menu{
  display:flex;
  gap:10px;
  padding:10px;
  justify-content:center;
  background:#08111d;
  border-bottom:1px solid rgba(42,168,255,.25);
}

.menu button{
  width:auto;
  padding:10px 18px;
}

/* MAIN CONTENT */
.main{
  height:calc(100dvh - 120px);
  overflow:auto;
  padding:12px;
}

/* PANELS */
.panel{
  background:linear-gradient(180deg,#08111d,#05080f);
  border:1px solid rgba(42,168,255,.3);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

.card{
  background:#050a12;
  border:1px solid rgba(42,168,255,.4);
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}

.stats{
  margin-bottom:12px;
}

/* INPUTS */
input,textarea,button{
  width:100%;
  padding:12px;
  border:none;
  outline:none;
  border-radius:10px;
  font-size:16px;
}

input,textarea{
  margin-bottom:10px;
  background:#0c1624;
  color:white;
  border:1px solid rgba(42,168,255,.35);
}

button{
  background:linear-gradient(90deg,#2aa8ff,#0e65ff);
  color:white;
  font-weight:bold;
}

/* MOBILE APP MENU */
@media(max-width:768px){

  header{
    height:55px;
    font-size:20px;
  }

  .menu{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    border-top:1px solid rgba(42,168,255,.25);
    border-bottom:none;
    padding-bottom:calc(10px + env(safe-area-inset-bottom));
    z-index:500;
  }

  .main{
    height:calc(100dvh - 55px);
    padding-bottom:95px;
  }

}
</style>
</head>

<body>

<!-- BOOT -->
<div id="bootScreen">
  <div class="bootTitle">WCZYTYWANIE...</div>
  <div class="bootBar"><div class="bootFill"></div></div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="loginBox">
    <div class="loginTitle">DOSTĘP</div>
    <input type="password" id="pass" placeholder="Kod dostępu">
    <button onclick="login()">WEJDŹ</button>
    <div id="loginError">❌ ZŁE HASŁO</div>
  </div>
</div>

<!-- APP -->
<div id="app">

<header>🦇 SYSTEM</header>

<div class="menu">
  <button onclick="show('contacts')">Kontakty</button>
  <button onclick="show('add')">Dodaj</button>
</div>

<div class="main">

<div class="panel stats" id="stats"></div>

<div id="contacts" class="tab">
  <div class="panel">
    <input id="search" placeholder="Skanuj bazę..." onkeyup="render()">
    <div id="contactsList"></div>
  </div>
</div>

<div id="add" class="tab" style="display:none;">
  <div class="panel">
    <input id="name" placeholder="Imię i nazwisko">
    <input id="phone" placeholder="Telefon">
    <input id="email" placeholder="E-mail">
    <input id="address" placeholder="Adres">
    <input id="tags" placeholder="Tagi">
    <textarea id="notes" placeholder="Notatki"></textarea>
    <button onclick="addContact()">DODAJ KONTAKT</button>
  </div>
</div>

</div>
</div>

<script>
const PASSWORD="batman";
let contacts=JSON.parse(localStorage.getItem("bat_contacts")||"[]");

window.onload=()=>{
  setTimeout(()=>{
    bootScreen.style.display="none";
    loginScreen.style.display="flex";
  },3000);

  render();
};

function login(){
  if(pass.value===PASSWORD){
    loginScreen.style.display="none";
    app.style.display="block";
  }else{
    loginError.style.display="block";
  }
}

function save(){
  localStorage.setItem("bat_contacts",JSON.stringify(contacts));
}

function show(id){
  document.querySelectorAll(".tab").forEach(t=>t.style.display="none");
  document.getElementById(id).style.display="block";
}

function addContact(){

  const c={
    id:Date.now(),
    name:name.value,
    phone:phone.value,
    email:email.value,
    address:address.value,
    tags:tags.value,
    notes:notes.value
  };

  contacts.unshift(c);
  save();
  render();

  name.value="";
  phone.value="";
  email.value="";
  address.value="";
  tags.value="";
  notes.value="";
}

function render(){

  let s=(search?.value||"").toLowerCase();

  let f=contacts.filter(c=>
    (c.name+c.phone+c.email+c.address+c.tags+c.notes)
    .toLowerCase()
    .includes(s)
  );

  contactsList.innerHTML="";

  f.forEach(c=>{
    contactsList.innerHTML+=`
      <div class="card">
        <b>${c.name}</b><br>
        📞 ${c.phone}<br>
        📧 ${c.email}<br>
        🏠 ${c.address}<br>
        🏷 ${c.tags}<br>
        📝 ${c.notes}<br><br>
        <button onclick="del(${c.id})">USUŃ</button>
      </div>
    `;
  });

  stats.innerHTML=`KONTAKTY: ${contacts.length} | WIDOCZNE: ${f.length}`;
}

function del(id){
  contacts=contacts.filter(c=>c.id!==id);
  save();
  render();
}
</script>

</body>
</html>
